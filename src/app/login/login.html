<div class="page-container">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Login' : 'Register' }}</h2>

    @if (isLoginMode) {
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="loginForm.email" name="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="loginForm.password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    } @else {
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" [(ngModel)]="registerForm.username" name="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="registerForm.email" name="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Birth Date</label>
          <input type="date" class="form-control" [(ngModel)]="registerForm.birthDate" name="birthDate" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="registerForm.password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
      </form>
    }

    <p class="mt-3">
      <button type="button" class="btn btn-link" (click)="toggleMode()">
        {{ isLoginMode ? 'Need an account? Register' : 'Already have an account? Login' }}
      </button>
    </p>
  </div>
</div>
