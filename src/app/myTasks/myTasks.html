<table>
    <thead>
        <tr>
            <th>dueDate</th>
            <th>subject</th>
            <th>status</th>
        </tr>
    </thead>

    <tbody>
        @for (task of tasks; track task) {
        <tr>
            <td>{{ task.dueDate }}</td>
            <td>{{ task.taskName }}</td>
            <td>{{ task.statusTypeId }}</td>
        </tr>
        }
    </tbody>
</table>
