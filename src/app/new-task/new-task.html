<div class="modal-header">
  <h4 class="modal-title">{{ isEditMode ? 'Edit Task' : 'New Task' }}</h4>
  <button type="button" class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
</div>

<div class="modal-body">
  <form>
    <div class="mb-3">
      <label class="form-label">Task Name</label>
      <input type="text" class="form-control" [(ngModel)]="formModel.taskName" name="taskName" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Due Date</label>
      <input type="datetime-local" class="form-control" [(ngModel)]="formModel.dueDate" name="dueDate" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Status</label>
      <select class="form-control" [(ngModel)]="formModel.statusTypeId" name="statusTypeId" required>
        <option value="" disabled>Select a status</option>
        @for (status of statuses(); track status.statusTypeId) {
          <option [value]="status.statusTypeId">{{ status.statusName }}</option>
        }
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">User</label>
      <select class="form-control" [(ngModel)]="formModel.userId" name="userId" required>
        <option [value]="0" disabled>Select a user</option>
        @for (user of users(); track user.userId) {
          <option [value]="user.userId">{{ user.username }}</option>
        }
      </select>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="save()">Save</button>
</div>
